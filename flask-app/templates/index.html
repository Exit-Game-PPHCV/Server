{% extends "base.html" %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/cockpit.css') }}">
{% endblock %}

{% block content %}
<div class="cockpit-container">
    <!-- Sky View -->
    <div class="sky-bg"></div>
    <div class="clouds"></div>

    <!-- Cockpit Overlay -->
    <div class="cockpit-frame">
        <div class="window-view"></div>

        <div class="dashboard">
            <!-- Left Side Sensors -->
            <div class="panel">
                <div class="panel-title">Airspeed</div>
                <div class="display-container">
                    <span id="speed-value" class="display-value">0</span>
                    <span class="unit">KNOTS</span>
                </div>
                <div class="panel-title" style="margin-top: 20px;">Altitude</div>
                <div class="display-container">
                    <span id="alt-value" class="display-value">0</span>
                    <span class="unit">FT</span>
                </div>

                <!-- NEW: Potentiometer -->
                <div class="panel-title" style="margin-top: 20px;">Throttle / Power</div>
                <div class="potentiometer-container">
                    <input type="range" id="potentiometer" min="0" max="100" value="50" class="slider">
                    <div class="poti-value-display"><span id="poti-value">50</span>%</div>
                </div>
            </div>

            <!-- Center Attitude Indicator -->
            <div class="panel center-panel">
                <div class="panel-title">Attitude Indicator</div>
                <div class="attitude-indicator">
                    <div class="ai-inner">
                        <div class="ai-sky"></div>
                        <div class="ai-ground"></div>
                    </div>
                    <div class="ai-plane-mark"></div>
                    <div class="center-dot"></div>
                </div>

                <!-- NEW: Visual Radio -->
                <div class="radio-panel">
                    <div class="panel-title" style="margin-top: 15px;">VHF COM</div>
                    <div class="radio-display">121.500</div>
                </div>
            </div>

            <!-- Right Side Sensors -->
            <div class="panel">
                <div class="panel-title">Cabin Temp</div>
                <div class="display-container">
                    <span id="temp-value" class="display-value">--.-</span>
                    <span class="unit">°C</span>
                </div>

                <div class="panel-title" style="margin-top: 20px;">System Status</div>
                <div class="display-container">
                    <span class="status-indicator" style="color: #4caf50;">ONLINE</span>
                </div>

                <!-- NEW: Pinpad -->
                <div class="panel-title" style="margin-top: 20px;">Auth Code</div>
                <div class="pinpad">
                    <button class="pin-btn">1</button>
                    <button class="pin-btn">2</button>
                    <button class="pin-btn">3</button>
                    <button class="pin-btn">4</button>
                    <button class="pin-btn">5</button>
                    <button class="pin-btn">6</button>
                    <button class="pin-btn">7</button>
                    <button class="pin-btn">8</button>
                    <button class="pin-btn">9</button>
                    <button class="pin-btn">*</button>
                    <button class="pin-btn">0</button>
                    <button class="pin-btn">#</button>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='js/socket.io.js') }}"></script>
<script src="{{ url_for('static', filename='js/cockpit.js') }}"></script>
{% endblock %}
