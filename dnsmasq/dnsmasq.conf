# DNS-Server Einstellungen
port=53
domain-needed
bogus-priv

# Wildcard-Eintrag: Alles was auf .game endet, zeigt auf deinen Raspi
# Ersetze 192.168.1.50 durch die echte IP deines Raspi!
address=/exit.game/192.168.1.50

# Da du offline bist: Verhindere, dass dnsmasq versucht, andere Server zu fragen
no-resolv
no-poll